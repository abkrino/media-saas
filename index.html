<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        // Global error logging with stack trace
        window.addEventListener('error', function(event) {
          var stack = event.error ? event.error.stack : 'No stack trace';
          // Filter out benign React/DOM errors caused by external interference
          if (event.message && (event.message.indexOf('removeChild') !== -1 || event.message.indexOf('insertBefore') !== -1)) {
            console.warn('Caught and suppressed DOM interference error:', event.message);
            event.preventDefault();
            return;
          }
          console.error('Global error:', event.message, '\nStack:', stack);
        });
        window.addEventListener('unhandledrejection', function(event) {
          var stack = (event.reason && event.reason.stack) ? event.reason.stack : 'No stack trace';
          console.error('Unhandled rejection:', event.reason, '\nStack:', stack);
        });

        // Patch DOM methods to be more resilient to external interference (e.g. extensions, harness)
        (function patchDOM() {
          try {
            var originalRemoveChild = Node.prototype.removeChild;
            Node.prototype.removeChild = function(child) {
              if (child && child.parentNode !== this) {
                return child; 
              }
              return originalRemoveChild.apply(this, arguments);
            };

            var originalInsertBefore = Node.prototype.insertBefore;
            Node.prototype.insertBefore = function(newNode, referenceNode) {
              if (referenceNode && referenceNode.parentNode !== this) {
                return this.appendChild(newNode);
              }
              return originalInsertBefore.apply(this, arguments);
            };
          } catch (e) {
            console.error('Failed to patch DOM methods:', e);
          }
        })();

        // Aggressive fix for read-only fetch
        (function fixFetch() {
          try {
            var target = window;
            var prop = 'fetch';
            var originalFetch = target[prop];

            // Try to delete it first to clear any non-configurable descriptors if possible
            try { delete target[prop]; } catch (e) {}

            Object.defineProperty(target, prop, {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.log('window.fetch was overwritten');
                originalFetch = v; 
              },
              configurable: true,
              enumerable: true
            });
            console.log('Successfully made window.fetch writable');
          } catch (e) {
            console.warn('Failed to redefine window.fetch on instance, trying prototype...', e);
            try {
              var proto = Object.getPrototypeOf(window);
              if (proto) {
                try { delete proto[prop]; } catch (e) {}
                Object.defineProperty(proto, prop, {
                  get: function() { return window.fetch; },
                  set: function(v) { /* ignore or handle */ },
                  configurable: true,
                  enumerable: true
                });
              }
            } catch (e2) {
              console.error('Critical: Could not fix window.fetch', e2);
            }
          }
        })();
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
